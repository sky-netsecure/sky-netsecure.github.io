<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางเรียน &amp; ตารางเวร | 4PMD รพ.ขอนแก่น 2569</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1b1e;
    --paper:#f5f2ea;
    --panel:#ffffff;
    --line:#dcd6c6;
    --teal:#0e4b4f;
    --teal-deep:#0a3538;
    --amber:#c8781f;
    --muted:#6b6458;
    --today:#c8781f;

    --pos-ems:#e34848;
    --pos-ems-bg:#fde2e2;
    --pos-resus:#3f6fd1;
    --pos-resus-bg:#dfe7fb;
    --pos-treatment:#b8971f;
    --pos-treatment-bg:#faf1cd;
    --pos-screen:#c8781f;
    --pos-screen-bg:#fbe6cf;
    --pos-ccc:#3f8b52;
    --pos-ccc-bg:#e0f0e2;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Sarabun',-apple-system,'Noto Sans Thai',sans-serif;
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  .app{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* header */
  .masthead{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:24px;
    border-bottom:3px solid var(--ink);
    padding-bottom:18px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .masthead .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 6px;
  }
  .masthead h1{
    font-size:clamp(24px,4vw,34px);
    margin:0;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .masthead .sub{
    color:var(--muted);
    font-size:13.5px;
    margin-top:6px;
  }
  .masthead .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    padding:8px 14px;
    border-radius:3px;
    white-space:nowrap;
  }

  /* tabs */
  .tabbar{
    display:flex;
    gap:6px;
    margin-bottom:22px;
  }
  .tabbar button{
    font-family:'Sarabun',sans-serif;
    font-size:15px;
    font-weight:600;
    padding:11px 22px;
    border:2px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    border-radius:3px;
    transition:background .15s,color .15s;
  }
  .tabbar button.active{
    background:var(--ink);
    color:var(--paper);
  }
  .tabbar button:hover:not(.active){
    background:rgba(15,27,30,.08);
  }

  .view{display:none;}
  .view.active{display:block;}

  /* ===== schedule (class) view ===== */
  .month-nav{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
  }
  .month-nav button{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    padding:7px 14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    cursor:pointer;
    color:var(--ink);
  }
  .month-nav button.active{
    background:var(--teal);
    color:#fff;
    border-color:var(--teal);
  }

  .week-block{margin-bottom:26px;}
  .week-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
    margin-bottom:10px;
  }

  .day-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:4px solid var(--teal);
    border-radius:4px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .day-card.is-holiday{border-left-color:#b0463f;}
  .day-card.is-exam{border-left-color:var(--amber);}
  .day-card.is-empty{opacity:.45;}
  .day-card.is-today{
    border-left-color:var(--today);
    box-shadow:0 0 0 2px var(--today) inset;
    background:#fffaf2;
  }

  .day-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .day-date{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:15px;
  }
  .day-weekday{
    font-size:13px;
    color:var(--muted);
  }
  .today-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    background:var(--today);
    color:#fff;
    padding:2px 8px;
    border-radius:10px;
    letter-spacing:.05em;
  }

  .session-row{
    display:flex;
    gap:14px;
    padding:6px 0;
    border-top:1px dashed var(--line);
    font-size:14px;
  }
  .session-row:first-of-type{border-top:none;}
  .session-time{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--teal);
    min-width:96px;
    flex-shrink:0;
    padding-top:2px;
  }
  .session-body .topic{font-weight:500;}
  .session-body .instr{color:var(--muted);font-size:13px;margin-top:1px;}
  .allday-note{font-size:14px;color:var(--ink);font-weight:500;}
  .empty-note{font-size:13px;color:var(--muted);font-style:italic;}

  /* ===== duty view ===== */
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
    padding:12px 14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
  }
  .legend-item{
    display:flex;align-items:center;gap:6px;
    font-size:13px;
    font-family:'JetBrains Mono',monospace;
  }
  .swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

  .duty-scroll{
    overflow-x:auto;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel);
  }
  table.duty{
    border-collapse:collapse;
    font-size:12.5px;
    white-space:nowrap;
  }
  table.duty th, table.duty td{
    border:1px solid var(--line);
    padding:5px 7px;
    text-align:center;
  }
  table.duty thead th{
    background:var(--teal-deep);
    color:#fff;
    font-weight:500;
    position:sticky;
    top:0;
    z-index:2;
  }
  table.duty thead tr.weekday-row th{
    background:var(--teal);
    font-size:10.5px;
    font-weight:400;
  }
  table.duty td.name-cell, table.duty th.name-cell{
    position:sticky;
    left:0;
    background:var(--panel);
    text-align:left;
    font-weight:500;
    z-index:1;
    box-shadow:2px 0 0 var(--line);
    min-width:190px;
  }
  table.duty thead th.name-cell{
    background:var(--teal-deep);
    color:#fff;
    z-index:3;
  }
  table.duty td.idx-cell, table.duty th.idx-cell{
    position:sticky;
    left:0;
    background:var(--panel);
    z-index:1;
    color:var(--muted);
  }
  table.duty thead th.idx-cell{background:var(--teal-deep);color:#fff;z-index:3;}
  table.duty td.today-col, table.duty th.today-col{
    box-shadow:inset 0 0 0 2px var(--today);
  }
  tr.me-row td{background:#fff7ea;}
  tr.me-row td.name-cell{background:#fdeccb;font-weight:700;}

  td.shift-cell{font-weight:600;}
  td.shift-EMS{background:var(--pos-ems-bg);color:var(--pos-ems);}
  td.shift-RESUS{background:var(--pos-resus-bg);color:var(--pos-resus);}
  td.shift-Treatment{background:var(--pos-treatment-bg);color:var(--pos-treatment);}
  td.shift-screen{background:var(--pos-screen-bg);color:var(--pos-screen);}
  td.shift-CCC{background:var(--pos-ccc-bg);color:var(--pos-ccc);}
  td.shift-note{
    font-size:10.5px;
    color:var(--muted);
    font-weight:400;
    white-space:normal;
    max-width:90px;
  }
  td.summary-cell{
    background:#f1efe6;
    font-weight:600;
    font-family:'JetBrains Mono',monospace;
  }

  .duty-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
  }
  .search-box{
    font-family:'Sarabun',sans-serif;
    font-size:13.5px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:20px;
    width:220px;
    background:#fff;
  }
  .search-box:focus{outline:2px solid var(--teal);outline-offset:1px;}

  footer.note{
    margin-top:30px;
    font-size:12px;
    color:var(--muted);
    border-top:1px solid var(--line);
    padding-top:12px;
  }

  @media (max-width:640px){
    .app{padding:18px 12px 60px;}
    .tabbar button{padding:9px 14px;font-size:13.5px;}
    .session-row{flex-direction:column;gap:2px;}
    .session-time{min-width:0;}
  }
  .duty-summary{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:22px;
  }
  .summary-chip{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 16px;
    min-width:140px;
  }
  .summary-chip.sc-grand{
    background:var(--teal-deep);
    border-color:var(--teal-deep);
  }
  .summary-chip.sc-grand .sc-month, .summary-chip.sc-grand .sc-nums span{color:#fff;}
  .sc-month{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:4px;
  }
  .sc-nums{
    display:flex;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
  }
  .sc-nums .sc-total{font-weight:700;color:var(--teal);}
  .summary-chip.sc-grand .sc-total{color:#fff;}

  .duty-card .duty-detail{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
  }
  .shift-name{font-weight:500;}
  .pos-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:600;
    padding:3px 10px;
    border-radius:12px;
  }
  .pos-badge.shift-EMS{background:var(--pos-ems-bg);color:var(--pos-ems);}
  .pos-badge.shift-RESUS{background:var(--pos-resus-bg);color:var(--pos-resus);}
  .pos-badge.shift-Treatment{background:var(--pos-treatment-bg);color:var(--pos-treatment);}
  .pos-badge.shift-screen{background:var(--pos-screen-bg);color:var(--pos-screen);}
  .pos-badge.shift-CCC{background:var(--pos-ccc-bg);color:var(--pos-ccc);}
    .to-top-btn{
    position:fixed;
    right:18px;
    bottom:24px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:var(--teal-deep);
    color:#fff;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 14px rgba(15,27,30,.35);
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transform:translateY(10px);
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
    -webkit-tap-highlight-color:transparent;
  }
  .to-top-btn.show{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0);
  }
  .to-top-btn svg{width:22px;height:22px;}
  .to-top-btn:active{background:var(--teal);}

  @supports (padding: max(0px)){
    .to-top-btn{
      bottom:max(24px, env(safe-area-inset-bottom) + 14px);
      right:max(18px, env(safe-area-inset-right) + 12px);
    }
  }
</style>
</head>
<body>
<div class="app">

  <div class="masthead">
    <div>
      <p class="eyebrow">4PMD &middot; รพ.ขอนแก่น &middot; ปีการศึกษา 2569</p>
      <h1>ตารางเรียน &amp; ตารางเวร</h1>
      <p class="sub">นิสิตแพทย์ฉุกเฉิน มหาวิทยาลัยมหาสารคาม</p>
    </div>
    <div class="badge" id="todayBadge">วันนี้ &mdash; &nbsp;</div>
  </div>

  <div class="tabbar">
    <button id="tabSchedBtn" class="active">ตารางเรียน</button>
    <button id="tabDutyBtn">ตารางเวร</button>
  </div>

  <!-- ================= SCHEDULE VIEW ================= -->
  <div id="viewSched" class="view active">
    <div class="month-nav" id="schedMonthNav"></div>
    <div id="schedContent"></div>
  </div>

  <!-- ================= DUTY VIEW (ธนพงษ์ only) ================= -->
  <div id="viewDuty" class="view">
    <div class="legend" id="dutyLegend"></div>
    <div class="duty-summary" id="dutySummary"></div>
    <div id="dutyList"></div>
  </div>


  <footer class="note">
    จัดทำจากไฟล์ตารางเรียนและตารางเวรต้นฉบับ &middot; สีในตารางเวรบ่งบอกตำแหน่งที่ขึ้นปฏิบัติงาน (EMS / RESUS / Treatment / screen / CCC)
  </footer>
</div>

<button id="toTopBtn" class="to-top-btn" aria-label="กลับขึ้นด้านบน" title="กลับขึ้นด้านบน">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 19V5"/>
    <path d="M5 12l7-7 7 7"/>
  </svg>
</button>

<script>
(function(){
  const SCHED = window.__SCHED__;
  const DUTY = window.__DUTY__;
  
  // อัพเดทวันที่อัตโนมัติตามเวลาระบบปัจจุบัน
  const now = new Date();
  const TODAY = {
    y: now.getFullYear() + 543, // แปลงเป็น พศ.
    m: now.getMonth() + 1,      // เดือน (1-12)
    d: now.getDate()            // วันที่ (1-31)
  };
  
  const MY_NAME = "นายธนพงษ์ เนตรพันธ์";
  const POS_LABELS = {EMS:'EMS', RESUS:'RESUS', Treatment:'Treatment', screen:'screen', CCC:'CCC'};

  // สร้างข้อความวันที่แบบอัตโนมัติ
  const monthNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                      'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const monthNameEn = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
                       'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const monthTh = monthNames[TODAY.m - 1];
  const monthShort = monthNameEn[TODAY.m - 1];
  const yearBE = TODAY.y;
  const yearAD = TODAY.y - 543;
  
  document.getElementById('todayBadge').textContent =
    `วันนี้ ${TODAY.d} ${monthTh} ${yearBE} (${TODAY.d} ${monthShort} ${yearAD})`;

  // ---------- TAB SWITCH ----------
  const tabSchedBtn = document.getElementById('tabSchedBtn');
  const tabDutyBtn = document.getElementById('tabDutyBtn');
  const viewSched = document.getElementById('viewSched');
  const viewDuty = document.getElementById('viewDuty');
  tabSchedBtn.onclick = () => {
    tabSchedBtn.classList.add('active'); tabDutyBtn.classList.remove('active');
    viewSched.classList.add('active'); viewDuty.classList.remove('active');
  };
  tabDutyBtn.onclick = () => {
    tabDutyBtn.classList.add('active'); tabSchedBtn.classList.remove('active');
    viewDuty.classList.add('active'); viewSched.classList.remove('active');
  };

  // ================= SCHEDULE RENDER =================
  const monthOrder = [];
  SCHED.forEach(d => { if(!monthOrder.includes(d.month)) monthOrder.push(d.month); });

  const schedMonthNav = document.getElementById('schedMonthNav');
  let curSchedMonth = monthOrder[0];

  function isTodaySched(monthName, date){
    const monthNumMap = {'กรกฎาคม':7,'สิงหาคม':8,'กันยายน':9,'ตุลาคม':10,'พฤศจิกายน':11};
    return monthNumMap[monthName]===TODAY.m && date===TODAY.d;
  }

  function renderSchedMonthNav(){
    schedMonthNav.innerHTML = '';
    monthOrder.forEach(m => {
      const b = document.createElement('button');
      b.textContent = m;
      if(m===curSchedMonth) b.classList.add('active');
      b.onclick = () => { curSchedMonth = m; renderSchedMonthNav(); renderSchedContent(); };
      schedMonthNav.appendChild(b);
    });
  }

  function renderSchedContent(){
    const container = document.getElementById('schedContent');
    container.innerHTML = '';
    const days = SCHED.filter(d => d.month === curSchedMonth);
    let curWeek = null;
    let weekWrap = null;
    days.forEach(d => {
      if(d.week !== curWeek){
        curWeek = d.week;
        const block = document.createElement('div');
        block.className = 'week-block';
        const label = document.createElement('div');
        label.className = 'week-label';
        label.textContent = 'สัปดาห์ ' + d.week.replace('wk','');
        block.appendChild(label);
        container.appendChild(block);
        weekWrap = block;
      }
      const card = document.createElement('div');
      const today = isTodaySched(d.month, d.date);
      let cls = 'day-card';
      const hasReal = d.sessions.some(s => s.time);
      const isAllDayNote = d.sessions.length && !hasReal;
      const noteText = isAllDayNote ? d.sessions[0].topic : '';
      if(isAllDayNote && /หยุด|วันเข้าพรรษา|วันอาสาฬหบูชา|เฉลิมพระชนมพรรษา|นวมินทร|ปิยมหาราช|ปิดภาคเรียน|เปิดภาคเรียน/.test(noteText)) cls += ' is-holiday';
      else if(isAllDayNote && /สอบ|MCQ|OSCE|Final|Midterm/i.test(noteText)) cls += ' is-exam';
      if(d.sessions.length===0) cls += ' is-empty';
      if(today) cls += ' is-today';
      card.className = cls;

      const head = document.createElement('div');
      head.className = 'day-head';
      head.innerHTML = '<span class="day-date">'+d.date+' '+curSchedMonth+'</span><span class="day-weekday">วัน'+d.day+'</span>' + (today ? '<span class="today-pill">วันนี้</span>' : '');
      card.appendChild(head);

      if(d.sessions.length === 0){
        const p = document.createElement('div');
        p.className = 'empty-note';
        p.textContent = 'ไม่มีกิจกรรมระบุ';
        card.appendChild(p);
      } else if(isAllDayNote){
        const p = document.createElement('div');
        p.className = 'allday-note';
        p.textContent = noteText.trim();
        card.appendChild(p);
      } else {
        d.sessions.forEach(s => {
          const row = document.createElement('div');
          row.className = 'session-row';
          const time = document.createElement('div');
          time.className = 'session-time';
          time.textContent = s.time || '';
          const body = document.createElement('div');
          body.className = 'session-body';
          const topic = document.createElement('div');
          topic.className = 'topic';
          topic.textContent = (s.topic||'').trim();
          body.appendChild(topic);
          if(s.instr){
            const instr = document.createElement('div');
            instr.className = 'instr';
            instr.textContent = s.instr.trim();
            body.appendChild(instr);
          }
          row.appendChild(time);
          row.appendChild(body);
          card.appendChild(row);
        });
      }
      weekWrap.appendChild(card);
    });
  }

  renderSchedMonthNav();
  renderSchedContent();

  // ================= DUTY RENDER (ธนพงษ์ only) =================
  const dutyLegend = document.getElementById('dutyLegend');
  const legendColors = {
    EMS: '#e34848', RESUS:'#3f6fd1', Treatment:'#b8971f', screen:'#c8781f', CCC:'#3f8b52'
  };
  Object.keys(legendColors).forEach(k => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<span class="swatch" style="background:'+legendColors[k]+'"></span>' + k;
    dutyLegend.appendChild(item);
  });

  const dutySheets = Object.keys(DUTY);

  function renderDutySummary(){
    const wrap = document.getElementById('dutySummary');
    wrap.innerHTML = '';
    let totChа=0, totBa=0, totDuk=0, totRuam=0;
    dutySheets.forEach(s => {
      const info = DUTY[s];
      const me = info.students.find(st => st.name === MY_NAME);
      if(!me) return;
      const sm = me.summary;
      totChа += sm['ช']||0; totBa += sm['บ']||0; totDuk += sm['ด']||0; totRuam += sm['รวม']||0;
      const card = document.createElement('div');
      card.className = 'summary-chip';
      card.innerHTML = '<div class="sc-month">'+info.month_name+'</div>'+
        '<div class="sc-nums"><span>ช '+(sm['ช']??0)+'</span><span>บ '+(sm['บ']??0)+'</span><span>ด '+(sm['ด']??0)+'</span><span class="sc-total">รวม '+(sm['รวม']??0)+'</span></div>';
      wrap.appendChild(card);
    });
    const totalCard = document.createElement('div');
    totalCard.className = 'summary-chip sc-grand';
    totalCard.innerHTML = '<div class="sc-month">รวมทั้งหมด</div>'+
      '<div class="sc-nums"><span>ช '+totChа+'</span><span>บ '+totBa+'</span><span>ด '+totDuk+'</span><span class="sc-total">รวม '+totRuam+'</span></div>';
    wrap.appendChild(totalCard);
  }

  function renderDutyList(){
    const container = document.getElementById('dutyList');
    container.innerHTML = '';
    const monthNumMap = {'กรกฎาคม':7,'สิงหาคม':8,'กันยายน':9,'ตุลาคม':10,'พฤศจิกายน':11,'ธันวาคม':12,
                         'มกราคม':1,'กุมภาพันธ์':2,'มีนาคม':3,'เมษายน':4,'พฤษภาคม':5,'มิถุนายน':6};
    dutySheets.forEach(sheetKey => {
      const info = DUTY[sheetKey];
      info.month_num = monthNumMap[info.month_name] || 0; // เพิ่ม month_num ถ้าไม่มี
      const me = info.students.find(st => st.name === MY_NAME);
      const block = document.createElement('div');
      block.className = 'week-block';
      const label = document.createElement('div');
      label.className = 'week-label';
      label.textContent = info.month_name + ' 2569';
      block.appendChild(label);

      if(!me || Object.keys(me.days).length===0){
        const empty = document.createElement('div');
        empty.className = 'empty-note';
        empty.textContent = 'ไม่มีเวรในเดือนนี้';
        block.appendChild(empty);
        container.appendChild(block);
        return;
      }

      const dayNums = Object.keys(me.days).map(Number).sort((a,b)=>a-b);
      dayNums.forEach(dn => {
        const cell = me.days[dn];
        const meta = info.day_meta[dn] || {};
        // คำนวณ isToday จากข้อมูล TODAY ที่อัพเดทอัตโนมัติ
        const isToday = (info.month_num === TODAY.m && dn === TODAY.d);
        const card = document.createElement('div');
        card.className = 'day-card duty-card' + (isToday ? ' is-today' : '');
        const shiftLabel = cell.val === 'ช' ? 'เวรเช้า' : (cell.val === 'บ' ? 'เวรบ่าย' : (cell.val === 'ด' ? 'เวรดึก' : cell.val));
        const posBadge = cell.pos ? '<span class="pos-badge shift-'+cell.pos+'">'+cell.pos+'</span>' : '';
        card.innerHTML =
          '<div class="day-head">'+
            '<span class="day-date">'+dn+' '+info.month_name+'</span>'+
            '<span class="day-weekday">วัน'+(meta.weekday||'')+'</span>'+
            (isToday ? '<span class="today-pill">วันนี้</span>' : '') +
          '</div>'+
          '<div class="duty-detail"><span class="shift-name">'+shiftLabel+' ('+cell.val+')</span>'+posBadge+'</div>';
        block.appendChild(card);
      });
      container.appendChild(block);
    });
  }

  renderDutySummary();
  renderDutyList();

  // ---------- BACK TO TOP ----------
  const toTopBtn = document.getElementById('toTopBtn');
  function updateToTopVisibility(){
    if(window.scrollY > 320) toTopBtn.classList.add('show');
    else toTopBtn.classList.remove('show');
  }
  window.addEventListener('scroll', updateToTopVisibility, {passive:true});
  updateToTopVisibility();
  toTopBtn.addEventListener('click', () => {
    window.scrollTo({top:0, behavior:'smooth'});
  });

})();
</script>
</body>
</html>
